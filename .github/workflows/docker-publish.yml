name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/overlays/**/kustomization.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dong5854/day-to-us-frontend
  MANIFEST_FILE: k8s/overlays/prod/kustomization.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in overlay
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          yq -i '.images[0].newTag = strenv(TAG)' "$MANIFEST_FILE"

      - name: Commit and push manifest
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST_FILE"
          git diff --staged --quiet && exit 0
          git commit -m "ci: 이미지 태그를 $TAG 로 갱신"
          git push
